title: z3rofork blog
description: "lose yourself"
author:
  name: "z3rofork"
  email: "z3rofork@github.io"
  url: "z3rofork@github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "z3rofork"
year : "2022"
